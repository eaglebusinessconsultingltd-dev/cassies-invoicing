{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>Generate Invoices</h2>
    <p>Select a month to generate and download invoices for all owners.</p>
    
    <div id="alert-container"></div>
    
    <div class="grid">
        <div>
            <label for="invoice-month">Month <span style="color: red;">*</span></label>
            <select id="invoice-month" required>
                <option value="">-- Select Month --</option>
            </select>
        </div>
        
        <div>
            <label for="invoice-year">Year <span style="color: red;">*</span></label>
            <select id="invoice-year" required>
                <option value="">-- Select Year --</option>
            </select>
        </div>
    </div>
    
    <div style="margin: 1rem 0; padding: 1rem; background: #ecf0f1; border-radius: 4px;">
        <strong>Preview: </strong><span id="preview-month">January 2026</span>
        <p><small>Work entries for this month will be included in the invoices.</small></p>
    </div>
    
    <button class="button success" id="btn-generate-invoices">Generate All Invoices</button>
    <button class="button secondary" id="btn-preview">Preview Before Generating</button>
</div>

<!-- Invoice preview -->
<div class="card" id="preview-card" style="display: none;">
    <h2>Invoice Preview</h2>
    <div id="preview-content"></div>
</div>

<!-- Invoice history -->
<div class="card">
    <h2>Invoice History</h2>
    
    <div style="margin-bottom: 1rem;">
        <button class="button" id="btn-download-all" style="display: none;">Download All as ZIP</button>
    </div>
    
    <div id="invoice-history" class="loading">
        <div class="spinner"></div>
        Loading invoice history...
    </div>
</div>

<script>
    // Months and years
    const monthNames = [
        'January', 'February', 'March', 'April', 'May', 'June',
        'July', 'August', 'September', 'October', 'November', 'December'
    ];
    
    // Populate months
    const monthSelect = document.getElementById('invoice-month');
    monthNames.forEach((month, idx) => {
        const option = document.createElement('option');
        option.value = idx;
        option.textContent = month;
        monthSelect.appendChild(option);
    });
    
    // Set current month
    const today = new Date();
    monthSelect.value = today.getMonth();
    
    // Populate years
    const yearSelect = document.getElementById('invoice-year');
    for (let year = 2025; year <= 2027; year++) {
        const option = document.createElement('option');
        option.value = year;
        option.textContent = year;
        yearSelect.appendChild(option);
    }
    yearSelect.value = today.getFullYear();
    
    // Update preview
    function updatePreview() {
        const month = monthSelect.options[monthSelect.selectedIndex].text;
        const year = yearSelect.value;
        document.getElementById('preview-month').textContent = `${month} ${year}`;
    }
    
    monthSelect.addEventListener('change', updatePreview);
    yearSelect.addEventListener('change', updatePreview);
    
    // Show alert
    function showAlert(message, type) {
        const container = document.getElementById('alert-container');
        const alert = document.createElement('div');
        alert.className = `alert alert-${type}`;
        alert.textContent = message;
        container.appendChild(alert);
        
        setTimeout(() => alert.remove(), 5000);
    }
    
    // Generate invoices
    document.getElementById('btn-generate-invoices').addEventListener('click', async function() {
        const month = monthSelect.value;
        const year = yearSelect.value;
        
        if (!month || !year) {
            showAlert('Please select a month and year', 'error');
            return;
        }
        
        this.disabled = true;
        this.textContent = 'Generating...';
        
        try {
            // Call backend to generate all invoices
            const response = await fetch('/api/invoices/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    month: parseInt(month),
                    year: parseInt(year)
                })
            });
            
            const result = await response.json();
            
            if (result.success) {
                showAlert(`Generated ${result.generated} invoice${result.generated !== 1 ? 's' : ''}`, 'success');
                
                // Reload invoices list
                loadInvoiceHistory();
                
                // If any errors, show them
                if (result.errors && result.errors.length > 0) {
                    showAlert('Some errors occurred: ' + result.errors.join('; '), 'warning');
                }
            } else {
                showAlert('Error: ' + (result.error || 'Unknown error'), 'error');
            }
        } catch (error) {
            showAlert('Error generating invoices: ' + error.message, 'error');
        } finally {
            this.disabled = false;
            this.textContent = 'Generate All Invoices';
        }
    });
    
    // Preview
    document.getElementById('btn-preview').addEventListener('click', async function() {
        const month = monthSelect.value;
        const year = yearSelect.value;
        
        if (!month || !year) {
            showAlert('Please select a month and year', 'error');
            return;
        }
        
        try {
            // Get work entries for this month
            const monthNum = parseInt(month);  // 0-based (0 = January, 3 = April, etc.)
            const yearNum = parseInt(year);
            
            const response = await fetch(`/api/work-entries?month=${monthNum + 1}&year=${yearNum}`);
            const entries = await response.json();
            
            if (entries.length === 0) {
                showAlert('No work entries for this month', 'warning');
                return;
            }
            
            // Group by owner
            const byOwner = {};
            entries.forEach(entry => {
                if (!byOwner[entry.owner_name]) {
                    byOwner[entry.owner_name] = [];
                }
                byOwner[entry.owner_name].push(entry);
            });
            
            // Build preview
            const previewCard = document.getElementById('preview-card');
            const previewContent = document.getElementById('preview-content');
            
            let html = '';
            Object.keys(byOwner).sort().forEach(owner => {
                const ownerEntries = byOwner[owner];
                const horses = [...new Set(ownerEntries.map(e => e.horse_name))];
                
                // Calculate total with per-line bank holiday doubling
                let total = 0;
                
                html += `
                    <div style="margin-bottom: 2rem; padding: 1rem; background: #f9f9f9; border: 1px solid #ddd; border-radius: 4px;">
                        <h3>${owner}</h3>
                        <p><small>Horses: ${horses.join(', ')}</small></p>
                        <div style="margin: 1rem 0; font-size: 0.8rem;">
                            <div style="display: grid; grid-template-columns: 0.6fr 0.8fr 1.5fr 0.6fr; gap: 0.5rem; padding: 0.4rem 0; font-weight: bold; border-bottom: 2px solid #34495e;">
                                <span style="text-align: left;">Date</span>
                                <span style="text-align: left;">Horse</span>
                                <span style="text-align: left;">Service</span>
                                <span style="text-align: right;">Cost</span>
                            </div>
                `;
                
                ownerEntries.sort((a, b) => new Date(a.date) - new Date(b.date)).forEach(entry => {
                    const dateObj = new Date(entry.date);
                    const dateStr = dateObj.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
                    
                    // Calculate cost: base * (2 if late_booking) * (2 if bank_holiday)
                    let displayCost = entry.base_cost;
                    let serviceName = entry.service_name;
                    
                    // Add Late Booking label and apply doubling
                    if (entry.surcharge_type === 'late_booking') {
                        displayCost *= 2;
                        serviceName += ' (Late Charge)';
                    }
                    
                    // Add Bank Holiday label and apply doubling
                    if (isBankHoliday(entry.date)) {
                        displayCost *= 2;
                        serviceName += ' (Bank Holiday Double Rate)';
                    }
                    
                    total += displayCost;
                    
                    html += `
                        <div style="display: grid; grid-template-columns: 0.6fr 0.8fr 1.5fr 0.6fr; gap: 0.5rem; padding: 0.3rem 0; border-bottom: 1px solid #eee; align-items: center;">
                            <span style="white-space: nowrap;">${dateStr}</span>
                            <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${entry.horse_name}</span>
                            <span>${serviceName}</span>
                            <span style="text-align: right; white-space: nowrap;"><strong>£${displayCost.toFixed(2)}</strong></span>
                        </div>
                    `;
                });
                
                html += `
                        </div>
                        <div style="text-align: right; padding-top: 0.5rem; border-top: 2px solid #34495e;">
                            <strong>Subtotal: £${total.toFixed(2)}</strong>
                        </div>
                    </div>
                `;
            });
            
            previewContent.innerHTML = html;
            previewCard.style.display = 'block';
            
            // Scroll to preview
            previewCard.scrollIntoView({ behavior: 'smooth' });
        } catch (error) {
            showAlert('Error loading preview: ' + error.message, 'error');
        }
    });
    
    // Load invoice history
    async function loadInvoiceHistory() {
        try {
            const response = await fetch('/api/invoices');
            let invoices = await response.json();
            
            const historyEl = document.getElementById('invoice-history');
            const downloadBtn = document.getElementById('btn-download-all');
            
            if (invoices.length === 0) {
                historyEl.innerHTML = '<p>No invoices generated yet.</p>';
                downloadBtn.style.display = 'none';
                return;
            }
            
            // Handle duplicates: for each owner/month/year combo, keep only the newest
            const invoiceMap = {};
            invoices.forEach(invoice => {
                const key = `${invoice.owner_name}-${invoice.month}-${invoice.year}`;
                if (!invoiceMap[key] || new Date(invoice.created_at) > new Date(invoiceMap[key].created_at)) {
                    if (invoiceMap[key]) {
                        // Delete the older one
                        fetch(`/api/invoices/${invoiceMap[key].id}`, { method: 'DELETE' }).catch(e => console.error(e));
                    }
                    invoiceMap[key] = invoice;
                } else {
                    // Delete this older one
                    fetch(`/api/invoices/${invoice.id}`, { method: 'DELETE' }).catch(e => console.error(e));
                }
            });
            
            // Get unique invoices (newest of each owner/month/year)
            invoices = Object.values(invoiceMap).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            
            downloadBtn.style.display = 'block';
            
            let html = '<table><thead><tr><th>Owner</th><th>Month</th><th>Created</th><th>Action</th></tr></thead><tbody>';
            invoices.forEach(invoice => {
                const dateObj = new Date(invoice.created_at);
                const dateStr = dateObj.toLocaleDateString('en-GB');
                
                html += `
                    <tr>
                        <td data-label="Owner">${invoice.owner_name}</td>
                        <td data-label="Month">${invoice.month} ${invoice.year}</td>
                        <td data-label="Created">${dateStr}</td>
                        <td data-label="Action">
                            <a href="/api/invoices/${invoice.id}/pdf" class="button" download>Download PDF</a>
                            <button class="button danger" onclick="deleteInvoice(${invoice.id})">Delete</button>
                        </td>
                    </tr>
                `;
            });
            html += '</tbody></table>';
            
            historyEl.innerHTML = html;
        } catch (error) {
            document.getElementById('invoice-history').innerHTML = '<p class="alert alert-error">Error loading history.</p>';
        }
    }
    
    // Delete invoice
    async function deleteInvoice(invoiceId) {
        if (!confirm('Are you sure you want to delete this invoice? This cannot be undone.')) return;
        
        try {
            const response = await fetch(`/api/invoices/${invoiceId}`, {
                method: 'DELETE',
            });
            
            if (response.ok) {
                showAlert('Invoice deleted');
                loadInvoiceHistory();
            } else {
                showAlert('Error deleting invoice', 'error');
            }
        } catch (error) {
            showAlert('Error: ' + error.message, 'error');
        }
    }
    
    // Download all invoices as ZIP
    async function downloadAllInvoices() {
        try {
            const response = await fetch('/api/invoices/download-all');
            if (response.ok) {
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `invoices-${new Date().toISOString().split('T')[0]}.zip`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                a.remove();
                showAlert('Downloaded all invoices');
            } else {
                showAlert('Error downloading invoices', 'error');
            }
        } catch (error) {
            showAlert('Error: ' + error.message, 'error');
        }
    }
    
    // Set up download all button
    document.getElementById('btn-download-all').addEventListener('click', downloadAllInvoices);
    
    // Load bank holidays for preview detection
    let bankHolidaysCache = [];
    async function loadBankHolidaysForPreview() {
        try {
            const response = await fetch('/api/bank-holidays');
            bankHolidaysCache = await response.json();
        } catch (error) {
            console.error('Error loading bank holidays:', error);
        }
    }
    
    // Check if a date is a bank holiday
    function isBankHoliday(dateStr) {
        return bankHolidaysCache.some(holiday => holiday.date === dateStr);
    }
    
    // Load bank holidays on page load
    loadBankHolidaysForPreview();
    loadInvoiceHistory();
</script>
{% endblock %}
